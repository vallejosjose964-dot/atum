
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATUM Scientific Interface</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#021018;
color:#e6faff;
font-family:Arial,Helvetica,sans-serif;
margin:0;
}

header{
text-align:center;
padding:25px;
background:#031c2a;
border-bottom:1px solid #0a4a63;
}

h1{
margin:0;
letter-spacing:2px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
padding:20px;
}

.panel{
background:#03131c;
border:1px solid #0a4a63;
border-radius:10px;
padding:20px;
}

select,button,input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
background:#021018;
border:1px solid #0a4a63;
color:#e6faff;
border-radius:6px;
}

button{
cursor:pointer;
}

.console{
background:black;
color:#00ff9c;
height:180px;
overflow:auto;
padding:10px;
font-family:monospace;
border-radius:6px;
}

footer{
text-align:center;
padding:20px;
opacity:.7;
}
</style>

</head>

<body>

<header>
<h1>ATUM Scientific Interface</h1>
<div>Motor Matemático THOT</div>
</header>

<div class="container">

<div class="panel">
<h3>Galaxias</h3>
<select id="galaxy"></select>
<button onclick="runGalaxy()">Ejecutar galaxia</button>
</div>

<div class="panel">
<h3>Clusters</h3>
<select id="cluster"></select>
<button onclick="runCluster()">Ejecutar cluster</button>
</div>

<div class="panel">
<h3>Micro Física</h3>
<select id="particle">
<option value="W">W Boson</option>
<option value="Z">Z Pole</option>
<option value="MUON">Muon</option>
</select>
<button onclick="runParticle()">Ejecutar cálculo</button>
</div>

<div class="panel">
<h3>Consola técnica</h3>
<div class="console" id="console"></div>
</div>

<div class="panel">
<h3>Backend</h3>
<input id="backend" value="https://atum-engine.onrender.com">
<button onclick="saveBackend()">Guardar backend</button>
</div>

</div>

<footer>
Born in Argentina · Created for Humanity
</footer>

<script>

const STORAGE="atum_backend"

function backend(){
return localStorage.getItem(STORAGE) || document.getElementById("backend").value
}

function log(msg){
let c=document.getElementById("console")
c.innerHTML+=msg+"<br>"
c.scrollTop=c.scrollHeight
}

function saveBackend(){
let url=document.getElementById("backend").value
localStorage.setItem(STORAGE,url)
log("Backend guardado: "+url)
}

async function runGalaxy(){

let g=document.getElementById("galaxy").value
log("Ejecutando galaxia "+g)

try{

let r=await fetch(backend()+"/galaxies-batch",{method:"POST"})
let t=await r.text()
log("Respuesta: "+t)

}catch(e){

log("Error backend")

}

}

async function runCluster(){

let c=document.getElementById("cluster").value
log("Ejecutando cluster "+c)

try{

let r=await fetch(backend()+"/clusters-batch",{method:"POST"})
let t=await r.text()
log("Respuesta: "+t)

}catch(e){

log("Error backend")

}

}

async function runParticle(){

let p=document.getElementById("particle").value
log("Calculando "+p)

try{

let r=await fetch(backend()+"/micro/"+p)
let t=await r.text()
log("Resultado: "+t)

}catch(e){

log("Error backend")

}

}

function load(){

let g=document.getElementById("galaxy")
for(let i=1;i<=175;i++){
let o=document.createElement("option")
o.value="G"+i
o.text="Galaxy "+i
g.appendChild(o)
}

let c=document.getElementById("cluster")
for(let i=1;i<=40;i++){
let o=document.createElement("option")
o.value="C"+i
o.text="Cluster "+i
c.appendChild(o)
}

}

load()

</script>

</body>
</html>
